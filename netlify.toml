# UniCart — Netlify configuration
# Netlify auto-detects Next.js and installs @netlify/plugin-nextjs, which
# handles the App Router, server components, and dynamic routes. Connect this
# repo in your PERSONAL Netlify account.

[build]
  # Apply pending Prisma migrations (over DIRECT_URL) before building. Safe and
  # idempotent: `migrate deploy` only applies already-created migrations, never
  # generates or resets. `prisma generate` runs separately in postinstall.
  command = "prisma migrate deploy && npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  # NOTE: do NOT set NPM_FLAGS="--omit=optional" here. It looks tempting to skip
  # the dev-only @imgly/background-removal-node (+ ~133MB onnxruntime), but it
  # ALSO strips lightningcss's native binary, which Tailwind v4 requires — the
  # CSS compile then fails ("Cannot find module ...lightningcss.*.node"). imgly
  # is a harmless no-op in prod (cutout.ts returns null when NODE_ENV=production),
  # so just let optional deps install.
